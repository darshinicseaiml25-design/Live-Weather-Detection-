<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>🌤 Weather App</h1>

    <div class="search-box">
      <input
        type="text"
        id="cityInput"
        placeholder="Enter city name"
      >
      <button id="searchBtn">Search</button>
    </div>

    <button id="locationBtn">
      📍 Use My Live Location
    </button>

    <div class="card">

      <h2 id="city">Loading...</h2>

      <img id="icon" alt="Weather Icon">

      <h1 id="temp">--°C</h1>

      <p id="condition">--</p>

      <div class="info">
        <div>
          <h3>💧</h3>
          <p id="humidity">--%</p>
        </div>

        <div>
          <h3>🌬️</h3>
          <p id="wind">-- km/h</p>
        </div>
      </div>

    </div>

  </div>
  <link rel="stylesheet" href="style.css">

  <script src="script.js"></script>

</body>
</html>
